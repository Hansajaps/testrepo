# ========================================
# STRIPE PAYMENT INTEGRATION
# ========================================
# Set to true to enable Stripe payments, false to disable
stripe.enabled=${STRIPE_ENABLED:false}

# Secret Key - NEVER expose to frontend
# Loaded from .env file or system environment variable STRIPE_SECRET_KEY
stripe.secret.key=${STRIPE_SECRET_KEY:}

# Publishable Key - Loaded from .env or system environment
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}

# MongoDB Configuration Tuning
# Aggressive idle time prevents Atlas from killing connections abruptly
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connect-timeout=10000
spring.data.mongodb.socket-timeout=120000

# Actuator & Health Checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mongo.enabled=true

# Resilience4j Configuration for MongoDB operations
resilience4j.retry.instances.mongoRetry.max-attempts=3
resilience4j.retry.instances.mongoRetry.wait-duration=1s
resilience4j.retry.instances.mongoRetry.retry-exceptions=org.springframework.dao.DataAccessResourceFailureException,com.mongodb.MongoSocketException

resilience4j.circuitbreaker.instances.mongoCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.mongoCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.mongoCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.mongoCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mongoCB.waitDurationInOpenState=5s

# Frontend URL for redirect after payment (Stripe Checkout)
stripe.frontend.url=http://localhost:5173

