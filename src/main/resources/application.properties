server.port=8085

# Database Configuration - Load from environment variable
spring.data.mongodb.uri=${MONGODB_URI}

# JWT Configuration - Load from environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration=86400

# ========================================
# STRIPE PAYMENT INTEGRATION
# ========================================
# Enable/Disable Stripe payment method
stripe.enabled=true

# Stripe API Keys - Load from environment variables for security
# See .env file for configuration values
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.frontend.url=${STRIPE_FRONTEND_URL:http://localhost:5173}

# ========================================
# BANK TRANSFER PAYMENT CONFIGURATION
# ========================================
# Configure bank details for bank transfer payments - Load from environment variables
bank.account.holder=${BANK_ACCOUNT_HOLDER}
bank.account.number=${BANK_ACCOUNT_NUMBER}
bank.routing.number=${BANK_ROUTING_NUMBER}
bank.name=${BANK_NAME}