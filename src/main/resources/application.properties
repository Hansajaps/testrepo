server.port=8085

# MongoDB Configuration - Set via environment variable MONGODB_URI
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://username:password@cluster.mongodb.net/Xchange?retryWrites=true&w=majority}

# JWT Configuration - Set via environment variable JWT_SECRET
jwt.secret=${JWT_SECRET:your-secret-key-here}
jwt.expiration=86400

# ========================================
# STRIPE PAYMENT INTEGRATION
# ========================================
# Enable/Disable Stripe payment method
stripe.enabled=true

# Stripe API Keys - Set via environment variables
# export STRIPE_SECRET_KEY=sk_test_xxxx
# export STRIPE_PUBLISHABLE_KEY=pk_test_xxxx
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}

# Frontend URL for redirect after payment (Stripe Checkout)
stripe.frontend.url=http://localhost:5173

# ========================================
# BANK TRANSFER PAYMENT CONFIGURATION
# ========================================
# Configure bank details for bank transfer payments
bank.account.holder=Xchange Marketplace Ltd.
bank.account.number=XXXX XXXX XXXX XXXX
bank.routing.number=XXXXXX
bank.name=Your Bank Name